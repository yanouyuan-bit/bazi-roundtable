name: skill-zip

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  verify:
    name: Verify packaged zip matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip and diff against source
        run: |
          mkdir -p /tmp/zipsrc
          unzip -q bazi-roundtable.zip -d /tmp/zipsrc
          # evals/ is dev tooling and intentionally not shipped in the zip
          diff -r --exclude=evals /tmp/zipsrc bazi-roundtable
      - name: Check entry paths use forward slashes
        run: |
          if unzip -l bazi-roundtable.zip | grep -qF '\'; then
            echo "zip contains backslash paths (breaks claude.ai upload)"; exit 1
          fi

  release:
    name: Attach zip to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build zip from source
        run: |
          cd bazi-roundtable
          zip -r ../bazi-roundtable-release.zip SKILL.md references scripts
      - uses: softprops/action-gh-release@v2
        with:
          files: bazi-roundtable-release.zip
